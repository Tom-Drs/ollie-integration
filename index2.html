<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homepage Ollie.</title>
    <link rel="stylesheet" href="css/style_homepage_2.css"/>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="wrap">
            <div class="left-header">
                <img class="logo-text" id="logo" src="images/logo.svg" alt="logo">
                <span class="logo-text">Ollie</span><span class="logo-text2">.</span>
                <nav>
                    <ul class="list-nav">
                        <li class="nav-page">Features</li>
                        <li class="nav-page">Pricing</li>
                        <li class="nav-page">Tours</li>
                        <li class="nav-page">Explore</li>
                    </ul>
                </nav>
            </div>
            <div class="right-header">
                <img class="search-icon" src="images/search.png" alt="search icon">
                <button class="btn-sign-up">Sign up now</button>
            </div>
        </div>

    </header>

</body>
</html>
