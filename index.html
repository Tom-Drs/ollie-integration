<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homepage Ollie.</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style_homepage.css"/>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="main-header">
            <div class="left-header">
                <img class="logo-text" src="images/logo.svg" alt="logo">
                <span class="logo-text">Ollie</span><span class="logo-text2">.</span>
                <nav>
                    <ul class="list-nav">
                        <li class="homepage nav-page" >Features</li>
                        <li class="nav-page">Pricing</li>
                        <li class="nav-page">Tours</li>
                        <li class="nav-page2">Explore</li>
                        <img src="images/arrow-header.svg" alt="">
                    </ul>

                </nav>
            </div>
            <div class="right-header">
                <img class="search-icon" src="images/search.png" alt="search icon">
                <div>
                    <button class="btn-sign-up">Sign up now</button>
                </div>
            </div>
        </div>
    </header>

    <section class="section1">
        <div class="container-sec-1">
            <div class="left">
                <h1>Get Work Done together</h1>
                <p>Create, build, collaborate and ship products faster. Good bye code! 👋</p>
            </div>
            <div class="right">
            </div>
        </div>
    </section>

</body>
</html>
